<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zadań - Autoryzacja</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="tabs">
                <button id="tab-login" class="active">Logowanie</button>
                <button id="tab-register">Rejestracja</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>Witaj ponownie</h2>
                <p>Zaloguj się do swojego panelu zadań</p>
                <div class="input-group">
                    <input id="loginEmail" type="email" placeholder="Email" required />
                </div>
                <div class="input-group">
                    <input id="loginPassword" type="password" placeholder="Hasło" required />
                </div>
                <button type="submit" class="btn-primary">Zaloguj się</button>
                <p id="loginResult" class="message"></p>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <h2>Utwórz konto</h2>
                <p>Dołącz do nas i zacznij planować</p>
                <div class="input-group">
                    <input id="name" type="text" placeholder="Imię" required />
                </div>
                <div class="input-group">
                    <input id="email" type="email" placeholder="Email" required />
                </div>
                <div class="input-group">
                    <input id="password" type="password" placeholder="Hasło" required />
                </div>
                <button type="submit" class="btn-primary">Zarejestruj się</button>
                <p id="registerResult" class="message"></p>
            </form>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
