<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twoje Zadania</title>
    <link rel="stylesheet" href="/public/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="main-header">
            <div class="user-profile">
                Witaj, <span id="userName">...</span>
            </div>
            <div class="header-actions">
                <button id="logoutBtn" class="btn-outline">Wyloguj</button>
                <button id="deleteAccountBtn" class="btn-danger-text">Usuń konto</button>
            </div>
        </header>

        <main class="content">
            <section class="add-task-section">
                <h1>Moja Lista</h1>
                <p id="counter" class="task-counter">0/0 ukończonych</p>
                
                <form id="taskForm" class="task-input-group">
                    <input id="title" placeholder="Co masz dziś do zrobienia?" required>
                    <button type="submit" class="btn-primary">Dodaj zadanie</button>
                </form>
            </section>

            <section class="tasks-container">
                <div id="tasksList" class="tasks-list">
                    </div>
            </section>
        </main>
    </div>

    <script type="module" src="/public/script.js"></script>
</body>
</html>
