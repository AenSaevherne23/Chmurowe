<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ToDo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Lista zadań</h1>

<form id="taskForm">
  <input id="title" placeholder="Nowe zadanie">
  <button>Dodaj</button>
</form>

<table id="tasksTable">
  <thead>
    <tr>
      <th>Wykonane</th>
      <th>Zadanie</th>
      <th>Akcje</th>
    </tr>
  </thead>
  <tbody>
    <!-- wiersze z zadaniami będą wstrzyknięte przez JS -->
  </tbody>
</table>

<script type="module" src="script.js"></script>

</body>
</html>
